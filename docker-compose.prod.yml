# =============================================================================
# Docker Compose — Production Stack
# =============================================================================
# Semua nilai sensitif dibaca dari file .env di root project.
# File .env ini TIDAK boleh di-commit ke repository (sudah ada di .gitignore).
#
# Services: app (PHP-FPM), nginx, mysql, redis, phpmyadmin, queue, scheduler
# =============================================================================

services:
  # -----------------------------------------------
  # APP — PHP 8.4 FPM (Laravel)
  # -----------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: ghcr.io/${DOCKER_IMAGE_PATH:-sim-desa-utama}/app:latest
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_app
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: app
    env_file: .env
    volumes:
      - app_storage:/var/www/storage
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sim_desa
    healthcheck:
      test: ['CMD-SHELL', 'php-fpm-healthcheck || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -----------------------------------------------
  # NGINX — Web Server (reverse proxy to PHP-FPM)
  # -----------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_nginx
    restart: unless-stopped
    ports:
      - '${APP_PORT}:80'
    volumes:
      - ./docker/production/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/storage:ro
      - .:/var/www
    depends_on:
      - app
    networks:
      - sim_desa

  # -----------------------------------------------
  # MYSQL — Database
  # -----------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_mysql
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sim_desa
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-u',
          'root',
          '-p${DB_ROOT_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # -----------------------------------------------
  # REDIS — Cache & Queue Backend
  # -----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_redis
    restart: unless-stopped
    ports:
      - '${FORWARD_REDIS_PORT}:6379'
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sim_desa
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # PHPMYADMIN — Database Management UI
  # -----------------------------------------------
  # ⚠️  CATATAN KEAMANAN (PRODUCTION):
  #   - phpMyAdmin sebaiknya HANYA diakses dari jaringan internal / VPN.
  #   - Jangan expose port PMA ke publik tanpa firewall atau reverse proxy + auth.
  #   - Di production, pertimbangkan untuk menghapus / mematikan service ini
  #     setelah setup awal selesai, atau buat profile terpisah.
  #   - Gunakan FORWARD_PMA_PORT yang TIDAK standar untuk menghindari scan bot.
  #   - Jika harus expose ke publik, WAJIB tambahkan:
  #     1. Reverse proxy dengan Basic Auth / IP whitelist
  #     2. TLS/HTTPS
  #     3. Rate limiting
  # -----------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_pma
    restart: unless-stopped
    ports:
      - '${FORWARD_PMA_PORT}:80'
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_PORT: ${DB_PORT}
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sim_desa
    # Opsional: matikan di production dengan uncomment baris di bawah
    # profiles: ["dev", "admin"]

  # -----------------------------------------------
  # QUEUE WORKER — Laravel Queue
  # -----------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: ghcr.io/${DOCKER_IMAGE_PATH:-sim-desa-utama}/app:latest
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_queue
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: queue
    env_file: .env
    volumes:
      - app_storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sim_desa

  # -----------------------------------------------
  # SCHEDULER — Laravel Task Scheduler
  # -----------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: ghcr.io/${DOCKER_IMAGE_PATH:-sim-desa-utama}/app:latest
    container_name: ${COMPOSE_PROJECT_NAME:-sim_desa}_scheduler
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: scheduler
    env_file: .env
    volumes:
      - app_storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sim_desa

# =============================================================================
# Volumes (persistent data)
# =============================================================================
volumes:
  app_storage:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  sim_desa:
    driver: bridge
