name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main, master]
  push:
    branches:
      - 'issue/**'
      - 'feature/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (PHP + Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, redis
          tools: composer:v2

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Pint (PHP Linter)
        run: composer lint:check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Generate Wayfinder Routes & Types
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan wayfinder:generate --with-form

      - name: ESLint Check
        run: npm run lint:check

      - name: Prettier Check
        run: npm run format:check

      - name: TypeScript Check
        run: npm run types:check

  test:
    name: Test (PHPUnit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, redis
          tools: composer:v2

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install NPM & Build Assets
        run: |
          npm ci
          npm run build

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate
          # CI uses SQLite for testing (configured in phpunit.xml)

      - name: Run PHPUnit Tests
        run: php artisan test

  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/production/Dockerfile
          push: false
          tags: ${{ vars.DOCKER_IMAGE_NAME || 'sim-desa-utama' }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
