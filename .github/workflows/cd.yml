name: Deploy to Production

# =============================================
# PENTING: Workflow ini TIDAK pernah jalan otomatis.
# Hanya bisa di-trigger secara manual (workflow_dispatch)
# atau saat Release/Tag di-publish.
# =============================================

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan deploy production'
        required: true
        default: 'Manual deploy untuk update production'
  release:
    types: [published]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code (for docker-compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.prod.yml,docker/production/nginx.conf"
          target: "/opt/sim-desa-utama"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/sim-desa-utama

            echo "==> Logging into GitHub Container Registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull app

            echo "==> Starting/updating all services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Running migrations..."
            docker exec ${COMPOSE_PROJECT_NAME:-sim_desa}_app php artisan migrate --force

            echo "==> Optimizing Laravel caches..."
            docker exec ${COMPOSE_PROJECT_NAME:-sim_desa}_app php artisan optimize

            echo "==> Restarting queue workers..."
            docker exec ${COMPOSE_PROJECT_NAME:-sim_desa}_queue php artisan queue:restart || true

            echo "==> Checking service health..."
            docker compose -f docker-compose.prod.yml ps

            echo "==> Deploy complete!"
